name: Receptionist Checks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mark checks pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Receptionist Checks',
              description: 'Validating receptionist code',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: npm run check

      - name: Run tests and capture result
        id: tests
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          summary=$(grep -E "not ok|AssertionError|ERR_ASSERTION|actual:|expected:" test-output.txt | tail -n 1 | tr '\n' ' ' | sed 's/^[[:space:]]*//' | cut -c1-120)
          if [ -z "$summary" ]; then summary="Test command exited with code $code"; fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Mark checks successful
        if: steps.tests.outputs.code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Receptionist Checks',
              description: 'Receptionist checks passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark checks failed
        if: steps.tests.outputs.code != '0'
        uses: actions/github-script@v7
        env:
          TEST_SUMMARY: ${{ steps.tests.outputs.summary }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Receptionist Checks',
              description: (process.env.TEST_SUMMARY || 'Receptionist checks failed').slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Fail job when tests fail
        if: steps.tests.outputs.code != '0'
        run: exit 1
