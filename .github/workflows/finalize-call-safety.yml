name: Finalize Call Safety

on:
  push:
    branches: [main]
    paths:
      - ".finalize-call-safety"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply final call lifecycle safeguards
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('server.js')
          source = path.read_text(encoding='utf-8')

          def replace_once(old, new):
            global source
            count = source.count(old)
            if count != 1:
              raise SystemExit(f'Expected one server anchor, found {count}: {old[:100]!r}')
            source = source.replace(old, new, 1)

          replace_once(
          """  callMetadata.set(id, {
              callerPhone: getCallerPhone(body) || previous.callerPhone || '',
              updatedAt: Date.now(),
            });""",
          """  callMetadata.set(id, {
              ...previous,
              callerPhone: getCallerPhone(body) || previous.callerPhone || '',
              updatedAt: Date.now(),
            });""")

          replace_once(
          """  if (now - ctx.lastSpeechAt >= SILENCE_LIMIT_MS) {""",
          """  if (!ctx.callerSpeaking && now - ctx.lastSpeechAt >= SILENCE_LIMIT_MS) {""")

          replace_once(
          """    lastSpeechAt: 0,
              lastProgressAt: 0,""",
          """    lastSpeechAt: 0,
              callerSpeaking: false,
              lastProgressAt: 0,""")

          replace_once(
          """  ctx.lastCallerTranscript = text;
            noteCallerActivity(ctx, text);""",
          """  ctx.lastCallerTranscript = text;
            ctx.callerSpeaking = false;
            noteCallerActivity(ctx, text);""")

          replace_once(
          """  if (message.type === 'conversation.item.input_audio_transcription.failed') {
              clearTranscriptTimer(ctx);""",
          """  if (message.type === 'conversation.item.input_audio_transcription.failed') {
              ctx.callerSpeaking = false;
              clearTranscriptTimer(ctx);""")

          replace_once(
          """  if (message.type === 'input_audio_buffer.speech_started') {
              if (ctx.ending) return;
              ctx.userSpeechStartedAt = Date.now();""",
          """  if (message.type === 'input_audio_buffer.speech_started') {
              if (ctx.ending) return;
              ctx.callerSpeaking = true;
              ctx.userSpeechStartedAt = Date.now();""")

          replace_once(
          """  if (message.type === 'input_audio_buffer.speech_stopped') {
              const speechMs = ctx.userSpeechStartedAt ? Date.now() - ctx.userSpeechStartedAt : 0;""",
          """  if (message.type === 'input_audio_buffer.speech_stopped') {
              ctx.callerSpeaking = false;
              const speechMs = ctx.userSpeechStartedAt ? Date.now() - ctx.userSpeechStartedAt : 0;""")

          replace_once(
          """  ctx.playbackMarkName = '';

            if (ctx.hangupAfterResponse) {""",
          """  ctx.playbackMarkName = '';

            if (!ctx.ending) ctx.lastSpeechAt = Date.now();

            if (ctx.hangupAfterResponse) {""")

          path.write_text(source, encoding='utf-8')
          Path('.github/workflows/finalize-call-safety.yml').unlink()
          Path('.finalize-call-safety').unlink()
          PY
      - run: npm install
      - run: npm run check && npm test
      - name: Commit final safeguards
        run: |
          git config user.name "ARK Automation"
          git config user.email "actions@users.noreply.github.com"
          git add server.js .github/workflows/finalize-call-safety.yml .finalize-call-safety
          git commit -m "Finalize call silence and rejection handling"
          git push
